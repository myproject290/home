<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shri Guru Ravidas Mahasabha Contributions Portal</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2225%22 fill=%22%23007bff%22/><text x=%2250%22 y=%2255%22 font-size=%2270%22 fill=%22white%22 font-family=%22Verdana, sans-serif%22 font-weight=%22900%22 text-anchor=%22middle%22 dominant-baseline=%22central%22>GR</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2225%22 fill=%22%23007bff%22/><text x=%2250%22 y=%2255%22 font-size=%2270%22 fill=%22white%22 font-family=%22Verdana, sans-serif%22 font-weight=%22900%22 text-anchor=%22middle%22 dominant-baseline=%22central%22>GR</text></svg>">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS Reset to kill all hidden gaps */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { background-color: #f4f7f9; font-family: 'Segoe UI', sans-serif; }
        
        /* Ultra-tight Banner - Zero Gaps */
        .banner-container {
            width: 100%;
            line-height: 0; 
            border-bottom: 5px solid #fdbb2d;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            background-color: #fff;
            margin: 0;
            padding: 0;
        }
        .banner-img {
            width: 100%;
            height: auto;
            display: block;
            margin: 0;
            padding: 0;
        }

        /* Container adjustment to bring form up */
        .main-content {
            padding-top: 0 !important; 
        }

        .form-card { 
            max-width: 600px; 
            margin: 10px auto 40px; 
            background: white; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            border-top: 5px solid #1a237e; 
        }
        .form-header { background: #f8f9fa; padding: 15px 20px; border-bottom: 1px solid #eee; font-weight: bold; color: #1a237e; text-align: center; border-radius: 15px 15px 0 0; }
        .form-body { padding: 25px; }
        .btn-view { background: #c62828; color: white; font-weight: bold; width: 100%; padding: 12px; border-radius: 10px; text-decoration: none; display: block; text-align: center; margin-bottom: 20px; border: none; transition: 0.3s; }
        .btn-view:hover { background: #b71c1c; color: white; transform: translateY(-1px); }
        .month-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 12px; background: #fff; padding: 15px; border: 1px solid #dee2e6; border-radius: 8px; }
        .month-item { display: flex; align-items: center; font-size: 1.15rem; font-weight: 600; cursor: pointer; color: #333; }
        .month-item input[type="checkbox"] { width: 22px; height: 22px; margin-right: 10px; cursor: pointer; }
        .footer-link { text-align: center; padding: 15px; background: #f1f3f9; border-radius: 10px; margin-top: 15px; border: 1px solid #d1d9e6; }
        .text-danger { color: #dc3545 !important; margin-left: 2px; }
        
        /* Bank Details Styling */
        .bank-card { background: #e8f0fe; border-radius: 12px; margin-top: 15px; padding: 15px; border: none; }
        .copy-box { background: white; border: 1px solid #dee2e6; border-radius: 8px; padding: 8px 12px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
        .copy-btn { color: #007bff; cursor: pointer; border: none; background: none; padding: 5px; }
        .copy-btn:hover { color: #0056b3; }
    </style>
</head>
<body>

<div class="banner-container">
    <img src="https://i.postimg.cc/yNQ5LPP5/grmnb.png" alt="Shri Guru Ravidas Mahasabha Banner" class="banner-img">
</div>

<div class="container" style="max-width: 600px;">
    <div class="bank-card shadow-sm">
        <h6 class="text-center fw-bold mb-3" style="color: #1a237e;"><i class="fas fa-university me-2"></i>BANK DETAILS FOR CONTRIBUTION</h6>
        <div class="row g-2">
            <div class="col-12">
                <div class="copy-box">
                    <div>
                        <small class="text-muted d-block" style="font-size: 0.7rem;">ACCOUNT NUMBER</small>
                        <span class="fw-bold" id="accNum">1989000100109244</span>
                    </div>
                    <button class="copy-btn" onclick="copyText('accNum')" title="Copy Account Number">
                        <i class="far fa-copy"></i>
                    </button>
                </div>
            </div>
            <div class="col-12">
                <div class="copy-box">
                    <div>
                        <small class="text-muted d-block" style="font-size: 0.7rem;">IFSC</small>
                        <span class="fw-bold" id="ifscCode">PUNB0198900</span>
                    </div>
                    <button class="copy-btn" onclick="copyText('ifscCode')" title="Copy IFSC">
                        <i class="far fa-copy"></i>
                    </button>
                </div>
            </div>
        </div>
        <p class="text-center mb-0 mt-1 text-muted" style="font-size: 0.75rem;"><i class="fas fa-check-circle me-1"></i> Tap icon to copy details for easy payments</p>
    </div>
</div>

<div class="container main-content">
    <div class="form-card">
        <div class="form-header" style="padding: 0;">
            <a href="https://docs.google.com/spreadsheets/d/1__Y5j0iXnJe6-auN7dnOE4wccrHik8nloFel6cmDN6g/export?format=pdf&size=A4&top_margin=0.5&bottom_margin=0.5&left_margin=0.5&right_margin=0.5&gridlines=false&fitw=true&portrait=true" target="_blank" class="btn-view" style="margin-bottom: 0; border-radius: 15px 15px 0 0;">
                <i class="fas fa-download me-2"></i>VIEW/ DOWNLOAD RECORDS
            </a>
        </div>
        
        <div class="form-body">
            <div style="font-weight: bold; color: #1a237e; text-align: center; margin-bottom: 20px; font-size: 1.25rem;">
                NEW CONTRIBUTION ENTRY
            </div>

            <form id="entryForm">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Name <span class="text-danger">*</span></label>
                        <input type="text" name="name" class="form-control" placeholder="Full Name" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Village <span class="text-danger">*</span></label>
                        <input type="text" name="village" class="form-control" placeholder="Village" required>
                    </div>
                </div>

                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Amount (₹) <span class="text-danger">*</span></label>
                        <input type="number" name="amount" class="form-control" placeholder="000" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label fw-bold">Date of transaction</label>
                        <input type="date" name="date" class="form-control" id="todayDate">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label fw-bold" style="font-size: 1.1rem; color: #1a237e;">Select Month(s): <span class="text-danger">*</span></label>
                    <div class="month-grid" id="monthGrid">
                        <label class="month-item"><input type="checkbox" name="month" value="Jan 2026"> Jan 2026</label>
                        <label class="month-item"><input type="checkbox" name="month" value="Feb 2026"> Feb 2026</label>
                        <label class="month-item"><input type="checkbox" name="month" value="Mar 2026"> Mar 2026</label>
                        <label class="month-item"><input type="checkbox" name="month" value="Apr 2026"> Apr 2026</label>
                        <label class="month-item"><input type="checkbox" name="month" value="May 2026"> May 2026</label>
                        <label class="month-item"><input type="checkbox" name="month" value="Jun 2026"> Jun 2026</label>
                        <label class="month-item"><input type="checkbox" name="month" value="Jul 2026"> Jul 2026</label>
                        <label class="month-item"><input type="checkbox" name="month" value="Aug 2026"> Aug 2026</label>
                        <label class="month-item"><input type="checkbox" name="month" value="Sep 2026"> Sep 2026</label>
                        <label class="month-item"><input type="checkbox" name="month" value="Oct 2026"> Oct 2026</label>
                        <label class="month-item"><input type="checkbox" name="month" value="Nov 2026"> Nov 2026</label>
                        <label class="month-item"><input type="checkbox" name="month" value="Dec 2026"> Dec 2026</label>
                        <div class="d-flex align-items-center mt-2" style="grid-column: 1 / -1;">
                            <input type="checkbox" id="otherCheck" style="width: 20px; height: 20px; margin-right: 10px;">
                            <input type="text" id="otherMonth" class="form-control form-control-sm" placeholder="Other (e.g. Jan 2027)">
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Mobile no. <span class="text-danger">*</span></label>
                    <input type="tel" name="mobile" class="form-control" placeholder="10 digit mobile number" pattern="[0-9]{10}" required>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Remarks (if any)</label>
                    <input type="text" name="remarks" class="form-control" placeholder="Optional notes">
                </div>

                <button type="submit" id="submitBtn" class="btn btn-primary w-100 fw-bold py-2 mb-2">
                    <i class="fas fa-save me-2"></i>SAVE RECORD
                </button>
            </form>

            <div class="footer-link">
                <a href="https://docs.google.com/spreadsheets/d/1__Y5j0iXnJe6-auN7dnOE4wccrHik8nloFel6cmDN6g/export?format=pdf&size=A4&top_margin=0.5&bottom_margin=0.5&left_margin=0.5&right_margin=0.5&gridlines=false&fitw=true&portrait=true" target="_blank" class="btn-view" style="margin-bottom: 0;">
                    <i class="fas fa-download me-2"></i>VIEW UPDATED RECORDS
                </a>
            </div>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzNDluF_oqvBY6FU0yBviTwaJleAGjv9ykuaG8FMJ-5lk-b8w9J6dNmziUyONMLaZ5c/exec';
    
    // Silent Copy function - relies on Android's system notification
    function copyText(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text).catch(err => {
            console.error('Failed to copy: ', err);
        });
    }

    function setDefaults() {
        const now = new Date();
        document.getElementById('todayDate').valueAsDate = now;
        document.querySelectorAll('input[name="month"]').forEach(cb => { cb.checked = false; });
        document.getElementById('otherCheck').checked = false;
        document.getElementById('otherMonth').value = '';
    }

    window.onload = setDefaults;

    document.getElementById('entryForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        let selectedMonths = Array.from(document.querySelectorAll('input[name="month"]:checked')).map(el => el.value);
        const otherCheck = document.getElementById('otherCheck');
        const otherValue = document.getElementById('otherMonth').value.trim();
        if (otherCheck.checked && otherValue) { selectedMonths.push(otherValue); }
        if (selectedMonths.length === 0) { alert("Please select at least one month."); return; }
        const monthsString = selectedMonths.join(", ");

        btn.disabled = true; 
        btn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i>Saving...';
        
        const formData = new FormData(this);
        const data = Object.fromEntries(formData.entries());
        data.month = monthsString;

        fetch(scriptURL, { 
            method: 'POST', 
            body: JSON.stringify(data) 
        })
        .then(response => {
            alert("Record Saved Successfully!");
            this.reset();
            setDefaults();
        })
        .catch(error => {
            alert("Error saving record.");
        })
        .finally(() => {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-save me-2"></i>SAVE RECORD';
        });
    });
</script>
</body>
</html>
