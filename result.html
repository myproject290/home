<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Portal 2026</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f9; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 25px; font-size: 1.4rem; }
        input { width: 100%; padding: 12px; border: 2px solid #3498db; border-radius: 8px; font-size: 16px; outline: none; margin-bottom: 15px; box-sizing: border-box; }
        input:disabled { background-color: #f0f0f0; color: #999; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { background-color: #bdc3c7 !important; cursor: not-allowed; }
        .btn-search { background-color: #3498db; color: white; }
        .btn-clear { background-color: #bdc3c7; color: #2c3e50; }
        #errorMsg { color: #e74c3c; font-size: 14px; margin-top: 10px; font-weight: bold; display: none; }
        #result { display: none; margin-top: 10px; background: #fafafa; padding: 15px; border-radius: 10px; border-top: 4px solid #3498db; }
        .age-header { background: #e67e22; color: white; padding: 10px; border-radius: 8px; font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; }
        .row { display: flex; padding: 10px 0; border-bottom: 1px solid #eee; text-align: left; align-items: baseline; }
        .label { font-weight: bold; color: #7f8c8d; width: 110px; flex-shrink: 0; font-size: 0.9rem; }
        .val { color: #2c3e50; font-weight: 500; flex-grow: 1; font-size: 0.95rem; }
        .rank-highlight { color: #2980b9; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>Dr. B.R. Ambedkar Annual Scholarship Examination Result-2026</h2>
    <input type="text" id="rollNo" placeholder="लोड हो रहा है..." disabled oninput="enableButton()">
    <div class="btn-group">
        <button id="searchBtn" class="btn-search" onclick="getResult()">Get Result</button>
        <button class="btn-clear" onclick="clearResult()">Clear</button>
    </div>
    <div id="errorMsg">रिकॉर्ड नहीं मिला। कृपया सही रोल नंबर डालें।</div>
    <div id="result">
        <div id="rAge" class="age-header"></div>
        <div class="row"><span class="label">रोल नंबर:</span> <span id="rRoll" class="val"></span></div>
        <div class="row"><span class="label">नाम:</span> <span id="rName" class="val"></span></div>
        <div class="row"><span class="label">पिता का नाम:</span> <span id="rFather" class="val"></span></div>
        <div class="row"><span class="label">प्राप्तांक:</span> <span id="rMarks" class="val"></span></div>
        <div class="row"><span class="label">स्थान (Rank):</span> <span class="val"><span id="rPos" class="rank-highlight"></span></span></div>
    </div>
</div>

<script>
    const baseSheetLink = "https://docs.google.com/spreadsheets/d/1EdPnAbPHI8GD5-28u2mbb-OnsYZN5O2-guBSGljBRHQ/gviz/tq?tqx=out:csv&sheet=Sheet2";
    let cachedData = null;

    async function loadSheetData() {
        try {
            const resp = await fetch(baseSheetLink + "&cb=" + new Date().getTime());
            const csvData = await resp.text();
            cachedData = csvData.split('\n').map(r => r.split(',').map(c => c.replace(/"/g, '').trim()));
            const input = document.getElementById('rollNo');
            input.disabled = false;
            input.placeholder = "रोल नंबर दर्ज करें...";
        } catch (err) {
            document.getElementById('rollNo').placeholder = "एरर!";
        }
    }

    // नया फंक्शन जो टाइप करते ही बटन एक्टिव कर देगा
    function enableButton() {
        document.getElementById('searchBtn').disabled = false;
    }

    function getResult() {
        const btn = document.getElementById('searchBtn');
        const rawInput = document.getElementById('rollNo').value.trim();
        const resDiv = document.getElementById('result');
        const errorDiv = document.getElementById('errorMsg');

        if (!rawInput || !cachedData) return;

        // बटन को डिसेबल (ग्रे) कर दिया
        btn.disabled = true;

        const inputNum = parseInt(rawInput, 10);
        const student = cachedData.find(row => parseInt(row[0], 10) === inputNum);

        if (student) {
            document.getElementById('rRoll').innerText = student[0];
            document.getElementById('rName').innerText = student[1];
            document.getElementById('rFather').innerText = student[2];
            document.getElementById('rAge').innerText = "आयु वर्ग: " + (student[5] || "---");
            document.getElementById('rMarks').innerText = student[6] || "---";
            document.getElementById('rPos').innerText = student[7] || "---";
            
            resDiv.style.display = "block";
            errorDiv.style.display = "none";
        } else {
            resDiv.style.display = "none";
            errorDiv.style.display = "block";
        }
    }

    function clearResult() {
        document.getElementById('rollNo').value = "";
        document.getElementById('result').style.display = "none";
        document.getElementById('errorMsg').style.display = "none";
        document.getElementById('searchBtn').disabled = false; // क्लियर करते ही बटन एक्टिव
        document.getElementById('rollNo').focus();
    }

    loadSheetData();
</script>
</body>
</html>
