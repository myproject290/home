<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Portal 2026</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2225%22 fill=%22%23007bff%22/><text x=%2250%22 y=%2255%22 font-size=%2275%22 fill=%22white%22 font-family=%22Verdana, sans-serif%22 font-weight=%22900%22 text-anchor=%22middle%22 dominant-baseline=%22central%22>R</text></svg>">
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f4f7f9; 
            display: flex; 
            justify-content: center; 
            padding: 20px; 
            margin: 0; 
        }
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
        }
        h2 { color: #2c3e50; margin-bottom: 25px; font-size: 1.4rem; line-height: 1.4; }
        
        input { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #3498db; 
            border-radius: 8px; 
            font-size: 16px; 
            outline: none; 
            margin-bottom: 15px; 
            box-sizing: border-box;
        }
        input:focus { border-color: #2ecc71; box-shadow: 0 0 8px rgba(46, 204, 113, 0.2); }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-search { background-color: #3498db; color: white; }
        .btn-search:hover { background-color: #2980b9; }
        .btn-clear { background-color: #bdc3c7; color: #2c3e50; }
        .btn-clear:hover { background-color: #95a5a6; }

        #errorMsg { color: #e74c3c; font-size: 14px; margin-top: 10px; font-weight: bold; display: none; }
        
        #result { display: none; margin-top: 10px; background: #fafafa; padding: 15px; border-radius: 10px; border-top: 4px solid #3498db; }
        .age-header { background: #e67e22; color: white; padding: 10px; border-radius: 8px; font-size: 1.2rem; font-weight: bold; margin-bottom: 15px; }
        
        .row { display: flex; padding: 10px 0; border-bottom: 1px solid #eee; text-align: left; }
        .label { font-weight: bold; color: #7f8c8d; width: 120px; flex-shrink: 0; font-size: 0.9rem; }
        .val { color: #2c3e50; font-weight: 500; flex-grow: 1; font-size: 0.95rem; }
        
        .absent-text { color: #e74c3c !important; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h2>Dr. B.R. Ambedkar Annual Scholarship Examination Result-2026</h2>
    
    <input type="text" id="rollNo" placeholder="अपना रोल नंबर यहाँ लिखें..." autofocus>
    
    <div class="btn-group">
        <button class="btn-search" onclick="getResult()">Get Result</button>
        <button class="btn-clear" onclick="clearResult()">Clear</button>
    </div>

    <div id="errorMsg">माफ़ करें, यह रोल नंबर रिकॉर्ड में नहीं है।</div>

    <div id="result">
        <div id="rAge" class="age-header"></div>
        <div class="row"><span class="label">रोल नंबर:</span> <span id="rRoll" class="val"></span></div>
        <div class="row"><span class="label">नाम:</span> <span id="rName" class="val"></span></div>
        <div class="row"><span class="label">पिता का नाम:</span> <span id="rFather" class="val"></span></div>
        <div class="row"><span class="label">प्राप्तांक:</span> <span id="rMarks" class="val"></span></div>
        <div class="row"><span class="label">स्थान (Rank):</span> <span id="rPos" class="val"></span></div>
    </div>
</div>

<script>
    const sheetLink = "https://docs.google.com/spreadsheets/d/1EdPnAbPHI8GD5-28u2mbb-OnsYZN5O2-guBSGljBRHQ/gviz/tq?tqx=out:csv&sheet=Sheet2";
    let cachedData = null;

    // Focus input on load
    window.onload = () => {
        document.getElementById('rollNo').focus();
    };

    async function loadSheetData() {
        try {
            const timestamp = new Date().getTime();
            const freshLink = `${sheetLink}&cacheBust=${timestamp}`;
            const resp = await fetch(freshLink);
            const csvData = await resp.text();
            cachedData = csvData.split('\n').map(r => 
                r.split(',').map(c => c.replace(/"/g, '').trim())
            );
        } catch (err) {
            console.error("Data load error:", err);
        }
    }

    loadSheetData();

    function getResult() {
        const rawInput = document.getElementById('rollNo').value.trim();
        const resDiv = document.getElementById('result');
        const errorDiv = document.getElementById('errorMsg');
        const rMarksSpan = document.getElementById('rMarks');

        if (!rawInput) {
            alert("कृपया रोल नंबर दर्ज करें।");
            return;
        }

        if (!cachedData) {
            alert("डेटा अभी लोड हो रहा है, कृपया प्रतीक्षा करें।");
            return;
        }

        const inputNum = parseInt(rawInput, 10);
        const student = cachedData.find(row => row[0] && parseInt(row[0], 10) === inputNum);

        if (student) {
            let marksVal = student[6] ? student[6].toString().trim() : "";
            let rankVal = student[7] ? student[7].toString().trim() : "";

            rMarksSpan.classList.remove('absent-text');

            if (marksVal.toLowerCase() === "absent" || marksVal === "" || rankVal.toLowerCase() === "absent") {
                document.getElementById('rMarks').innerText = "Absent";
                document.getElementById('rPos').innerText = "Not Applicable";
                rMarksSpan.classList.add('absent-text');
            } else {
                document.getElementById('rMarks').innerText = marksVal;
                document.getElementById('rPos').innerText = rankVal || "---";
            }

            document.getElementById('rRoll').innerText   = student[0] || "---"; 
            document.getElementById('rAge').innerText    = student[5] ? "आयु वर्ग: " + student[5] : "---"; 
            document.getElementById('rName').innerText   = student[1] || "---"; 
            document.getElementById('rFather').innerText = student[2] || "---"; 
            
            errorDiv.style.display = "none";
            resDiv.style.display = "block";
        } else {
            resDiv.style.display = "none";
            errorDiv.style.display = "block";
        }
    }

    function clearResult() {
        document.getElementById('rollNo').value = "";
        document.getElementById('result').style.display = "none";
        document.getElementById('errorMsg').style.display = "none";
        document.getElementById('rollNo').focus();
    }

    document.getElementById('rollNo').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            getResult();
        }
    });
</script>

</body>
</html>
