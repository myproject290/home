<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Portal - 2026</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2225%22 fill=%22%23007bff%22/><text x=%2250%22 y=%2255%22 font-size=%2275%22 fill=%22white%22 font-family=%22Verdana, sans-serif%22 font-weight=%22900%22 text-anchor=%22middle%22 dominant-baseline=%22central%22>R</text></svg>">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f9; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 25px; font-size: 1.4rem; }
        input { width: 90%; padding: 12px; border: 2px solid #3498db; border-radius: 8px; font-size: 16px; outline: none; margin-bottom: 5px; }
        input:focus { border-color: #2ecc71; }
        #errorMsg { color: #e74c3c; font-size: 14px; margin-top: 10px; font-weight: bold; display: none; text-align: center; }
        #result { display: none; margin-top: 25px; background: #fafafa; padding: 15px; border-radius: 10px; border-top: 4px solid #3498db; }
        .age-header { background: #e67e22; color: white; padding: 10px; border-radius: 8px; font-size: 1.3rem; font-weight: bold; margin-bottom: 15px; display: block; }
        .row { display: flex; padding: 10px 0; border-bottom: 1px solid #eee; text-align: left; }
        .label { font-weight: bold; color: #7f8c8d; width: 130px; flex-shrink: 0; font-size: 0.9rem; }
        .val { color: #2c3e50; font-weight: 500; flex-grow: 1; text-align: left; font-size: 0.95rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>Dr. B.R. Ambedkar Annual Scholarship Examination Result-2026</h2>
    <input type="text" id="rollNo" placeholder="अपना रोल नंबर यहाँ लिखें..." oninput="liveSearch()">
    
    <div id="errorMsg">माफ़ करें, यह रोल नंबर रिकॉर्ड में नहीं है।</div>

    <div id="result">
        <div id="rAge" class="age-header"></div>
        <div class="row"><span class="label">रोल नंबर:</span> <span id="rRoll" class="val"></span></div>
        <div class="row"><span class="label">नाम:</span> <span id="rName" class="val"></span></div>
        <div class="row"><span class="label">पिता का नाम:</span> <span id="rFather" class="val"></span></div>
        <div class="row"><span class="label">प्राप्तांक:</span> <span id="rMarks" class="val"></span></div>
        <div class="row"><span class="label">स्थान (Rank):</span> <span id="rPos" class="val"></span></div>
    </div>
</div>

<script>
    const sheetLink = "https://docs.google.com/spreadsheets/d/1EdPnAbPHI8GD5-28u2mbb-OnsYZN5O2-guBSGljBRHQ/gviz/tq?tqx=out:csv&sheet=Sheet2";
    let cachedData = null;

    async function loadSheetData() {
        try {
            const timestamp = new Date().getTime();
            const freshLink = `${sheetLink}&cacheBust=${timestamp}`;
            const resp = await fetch(freshLink);
            const csvData = await resp.text();
            cachedData = csvData.split('\n').map(r => 
                r.split(',').map(c => c.replace(/"/g, '').trim())
            );
        } catch (err) {
            console.error("Data load error:", err);
        }
    }

    loadSheetData();

    function liveSearch() {
        const rawInput = document.getElementById('rollNo').value.trim();
        const resDiv = document.getElementById('result');
        const errorDiv = document.getElementById('errorMsg');

        if (!rawInput) {
            resDiv.style.display = "none";
            errorDiv.style.display = "none";
            return;
        }

        if (!cachedData) return;

        const cleanInput = parseInt(rawInput, 10).toString();

        const student = cachedData.find(row => {
            if (!row[0]) return false;
            return parseInt(row[0], 10).toString() === cleanInput;
        });

        if (student) {
            // रोल नंबर अपडेट करने वाली लाइन
            document.getElementById('rRoll').innerText   = student[0] || "---"; 
            document.getElementById('rAge').innerText    = student[5] ? "आयु वर्ग: " + student[5] : "---"; 
            document.getElementById('rName').innerText   = student[1] || "---"; 
            document.getElementById('rFather').innerText = student[2] || "---"; 
            document.getElementById('rMarks').innerText  = student[6] || "0";   
            document.getElementById('rPos').innerText    = student[7] || "---"; 
            
            errorDiv.style.display = "none";
            resDiv.style.display = "block";
        } else {
            resDiv.style.display = "none";
            errorDiv.style.display = "block";
        }
    }
</script>

</body>
</html>
